<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>消息通知 - AI 租易用</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root {
            --primary: #0EA5E9;
            --primary-dark: #0C4A6E;
            --accent: #F59E0B;
            --bg-dark: #0B1120;
            --bg-card: #1E293B;
            --text-light: #F1F5F9;
            --text-muted: #94A3B8;
            --gradient: linear-gradient(135deg, #0EA5E9 0%, #7C3AED 100%);
            --gradient-gold: linear-gradient(135deg, #F59E0B 0%, #D97706 100%);
            --success: #10B981;
            --warning: #F59E0B;
            --danger: #EF4444;
        }
        
        body {
            font-family: 'Inter', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: var(--bg-dark);
            color: var(--text-light);
            line-height: 1.7;
        }
        
        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: radial-gradient(ellipse at 50% 10%, rgba(124, 58, 237, 0.06) 0%, transparent 50%);
            pointer-events: none;
            z-index: -1;
        }
        
        /* Navigation */
        .navbar {
            position: fixed;
            top: 0;
            width: 100%;
            padding: 1rem 5%;
            background: rgba(11, 17, 32, 0.95);
            backdrop-filter: blur(20px);
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 1000;
            border-bottom: 1px solid rgba(255,255,255,0.08);
        }
        
        .nav-logo-wrapper { position: absolute; left: 5%; }
        .nav-container { display: flex; align-items: center; gap: 3rem; flex: 1; justify-content: center; }
        .nav-right-wrapper { position: absolute; right: 5%; }
        
        .logo {
            font-size: 1.6rem;
            font-weight: 800;
            background: var(--gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-decoration: none;
        }
        
        .nav-links { display: flex; gap: 0.5rem; list-style: none; margin: 0; padding: 0; }
        
        .nav-links a {
            color: var(--text-muted);
            text-decoration: none;
            padding: 0.6rem 1rem;
            border-radius: 8px;
            font-weight: 500;
            transition: all 0.3s;
        }
        
        .nav-links a:hover, .nav-links a.active {
            color: var(--text-light);
            background: rgba(14, 165, 233, 0.12);
        }
        
        .btn {
            padding: 0.75rem 1.5rem;
            border-radius: 10px;
            font-weight: 600;
            text-decoration: none;
            transition: all 0.3s;
            border: none;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
        }
        
        .btn-primary {
            background: var(--gradient);
            color: white;
            box-shadow: 0 4px 20px rgba(14, 165, 233, 0.3);
        }
        
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 30px rgba(14, 165, 233, 0.4); }
        
        .btn-outline {
            background: transparent;
            border: 2px solid rgba(255,255,255,0.2);
            color: var(--text-light);
        }
        
        .btn-outline:hover { border-color: var(--primary); background: rgba(14, 165, 233, 0.1); }
        
        .btn-sm {
            padding: 0.5rem 1rem;
            font-size: 0.875rem;
        }
        
        .btn-danger {
            background: var(--danger);
            color: white;
        }
        
        .btn-danger:hover { background: #DC2626; }
        
        /* Notification Icon in Navbar */
        .notification-icon {
            position: relative;
            cursor: pointer;
            padding: 0.5rem;
            border-radius: 8px;
            transition: background 0.3s;
        }
        
        .notification-icon:hover {
            background: rgba(14, 165, 233, 0.1);
        }
        
        .notification-icon svg {
            width: 24px;
            height: 24px;
            fill: none;
            stroke: var(--text-light);
            stroke-width: 2;
        }
        
        .notification-badge {
            position: absolute;
            top: 2px;
            right: 2px;
            background: var(--danger);
            color: white;
            font-size: 0.7rem;
            font-weight: 700;
            min-width: 18px;
            height: 18px;
            border-radius: 9px;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0 4px;
        }
        
        .notification-badge.hidden {
            display: none;
        }
        
        /* Page Hero */
        .page-hero {
            padding: 10rem 5% 2rem;
            text-align: center;
        }
        
        .page-hero h1 {
            font-size: 2.5rem;
            font-weight: 800;
            margin-bottom: 0.5rem;
        }
        
        .page-hero p {
            color: var(--text-muted);
            font-size: 1.1rem;
        }
        
        .breadcrumb {
            display: flex;
            justify-content: center;
            gap: 0.5rem;
            margin-bottom: 2rem;
            font-size: 0.9rem;
        }
        
        .breadcrumb a { color: var(--text-muted); text-decoration: none; }
        .breadcrumb a:hover { color: var(--primary); }
        
        /* Main Container */
        .main-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem 5%;
            display: grid;
            grid-template-columns: 280px 1fr;
            gap: 2rem;
        }
        
        /* Sidebar */
        .sidebar {
            background: var(--bg-card);
            border-radius: 16px;
            border: 1px solid rgba(255,255,255,0.08);
            padding: 1.5rem;
            height: fit-content;
        }
        
        .user-profile {
            text-align: center;
            padding: 1.5rem;
            border-bottom: 1px solid rgba(255,255,255,0.08);
            margin-bottom: 1.5rem;
        }
        
        .user-avatar {
            width: 80px;
            height: 80px;
            background: var(--gradient);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            font-weight: 700;
            margin: 0 auto 1rem;
        }
        
        .user-name {
            font-size: 1.1rem;
            font-weight: 700;
            margin-bottom: 0.25rem;
        }
        
        .user-level {
            color: var(--text-muted);
            font-size: 0.9rem;
        }
        
        .sidebar-nav {
            list-style: none;
        }
        
        .sidebar-nav a {
            display: flex;
            align-items: center;
            padding: 0.875rem 1rem;
            border-radius: 10px;
            color: var(--text-muted);
            text-decoration: none;
            transition: all 0.3s;
            margin-bottom: 0.5rem;
        }
        
        .sidebar-nav a:hover, .sidebar-nav a.active {
            background: rgba(14, 165, 233, 0.12);
            color: var(--text-light);
        }
        
        .sidebar-nav .icon {
            margin-right: 0.75rem;
            font-size: 1.2rem;
        }
        
        /* Main Content */
        .content-area {
            background: var(--bg-card);
            border-radius: 16px;
            border: 1px solid rgba(255,255,255,0.08);
            padding: 2rem;
        }
        
        .content-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            padding-bottom: 1.5rem;
            border-bottom: 1px solid rgba(255,255,255,0.08);
        }
        
        .content-title {
            font-size: 1.5rem;
            font-weight: 700;
        }
        
        .batch-actions {
            display: flex;
            gap: 1rem;
        }
        
        .filter-tabs {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 2rem;
            flex-wrap: wrap;
        }
        
        .filter-tab {
            padding: 0.6rem 1.25rem;
            border-radius: 8px;
            background: var(--bg-dark);
            color: var(--text-muted);
            border: 1px solid rgba(255,255,255,0.08);
            cursor: pointer;
            transition: all 0.3s;
            font-size: 0.9rem;
            font-weight: 500;
        }
        
        .filter-tab:hover {
            border-color: var(--primary);
            color: var(--text-light);
        }
        
        .filter-tab.active {
            background: var(--primary);
            border-color: var(--primary);
            color: white;
        }
        
        /* Notification List */
        .notification-list {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }
        
        .notification-item {
            background: var(--bg-dark);
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.08);
            padding: 1.5rem;
            transition: all 0.3s;
            display: flex;
            gap: 1.25rem;
            align-items: flex-start;
        }
        
        .notification-item:hover {
            border-color: rgba(14, 165, 233, 0.3);
            transform: translateX(4px);
        }
        
        .notification-item.unread {
            background: rgba(14, 165, 233, 0.05);
            border-left: 3px solid var(--primary);
        }
        
        .notification-icon-type {
            width: 48px;
            height: 48px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            flex-shrink: 0;
        }
        
        .notification-icon-type.system { background: rgba(14, 165, 233, 0.1); }
        .notification-icon-type.order { background: rgba(16, 185, 129, 0.1); }
        .notification-icon-type.rental { background: rgba(245, 158, 11, 0.1); }
        .notification-icon-type.token { background: rgba(124, 58, 237, 0.1); }
        
        .notification-content {
            flex: 1;
            min-width: 0;
        }
        
        .notification-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 0.5rem;
        }
        
        .notification-title {
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--text-light);
        }
        
        .notification-time {
            font-size: 0.85rem;
            color: var(--text-muted);
            white-space: nowrap;
        }
        
        .notification-summary {
            color: var(--text-muted);
            font-size: 0.95rem;
            line-height: 1.6;
            margin-bottom: 0.75rem;
        }
        
        .notification-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .notification-type-badge {
            font-size: 0.75rem;
            padding: 0.25rem 0.75rem;
            border-radius: 20px;
            font-weight: 600;
            text-transform: uppercase;
        }
        
        .notification-type-badge.system { background: rgba(14, 165, 233, 0.1); color: var(--primary); }
        .notification-type-badge.order { background: rgba(16, 185, 129, 0.1); color: var(--success); }
        .notification-type-badge.rental { background: rgba(245, 158, 11, 0.1); color: var(--warning); }
        .notification-type-badge.token { background: rgba(124, 58, 237, 0.1); color: #8B5CF6; }
        
        .notification-actions {
            display: flex;
            gap: 0.5rem;
        }
        
        .notification-actions button {
            padding: 0.4rem 0.875rem;
            border-radius: 6px;
            font-size: 0.85rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s;
            border: none;
        }
        
        .btn-mark-read {
            background: transparent;
            border: 1px solid rgba(255,255,255,0.2);
            color: var(--text-muted);
        }
        
        .btn-mark-read:hover {
            border-color: var(--primary);
            color: var(--primary);
        }
        
        .btn-delete {
            background: transparent;
            border: 1px solid rgba(239, 68, 68, 0.3);
            color: var(--danger);
        }
        
        .btn-delete:hover {
            background: var(--danger);
            color: white;
        }
        
        .unread-indicator {
            width: 10px;
            height: 10px;
            background: var(--primary);
            border-radius: 50%;
            flex-shrink: 0;
            margin-top: 0.25rem;
        }
        
        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 4rem 2rem;
            color: var(--text-muted);
        }
        
        .empty-state-icon {
            font-size: 4rem;
            margin-bottom: 1.5rem;
            opacity: 0.5;
        }
        
        .empty-state h3 {
            font-size: 1.25rem;
            margin-bottom: 0.5rem;
            color: var(--text-light);
        }
        
        /* Checkbox */
        .checkbox-wrapper {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            cursor: pointer;
        }
        
        .checkbox-wrapper input[type="checkbox"] {
            width: 18px;
            height: 18px;
            cursor: pointer;
            accent-color: var(--primary);
        }
        
        /* Mobile Toggle */
        .mobile-toggle { display: none; flex-direction: column; gap: 6px; cursor: pointer; }
        
        .mobile-toggle span {
            width: 28px;
            height: 3px;
            background: var(--text-light);
            border-radius: 2px;
        }
        
        .mobile-menu {
            display: none;
            position: absolute;
            top: 100%;
            left: 0;
            width: 100%;
            background: var(--bg-card);
            padding: 1.5rem 5%;
            flex-direction: column;
            gap: 0.75rem;
        }
        
        .mobile-menu.active { display: flex; }
        
        .mobile-menu a {
            color: var(--text-light);
            text-decoration: none;
            padding: 0.875rem 1rem;
            border-radius: 10px;
        }
        
        /* User Menu */
        .user-menu {
            position: relative;
            display: none;
        }
        
        .user-menu.active {
            display: block;
        }
        
        .user-btn {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.5rem 1rem;
            background: rgba(14, 165, 233, 0.1);
            border: 1px solid rgba(14, 165, 233, 0.3);
            border-radius: 10px;
            color: var(--text-light);
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .user-btn:hover {
            background: rgba(14, 165, 233, 0.2);
        }
        
        .user-avatar-small {
            width: 32px;
            height: 32px;
            background: var(--gradient);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 0.9rem;
        }
        
        .user-dropdown {
            position: absolute;
            top: 100%;
            right: 0;
            margin-top: 0.5rem;
            background: var(--bg-card);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            padding: 0.75rem 0;
            min-width: 180px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.4);
            display: none;
        }
        
        .user-dropdown.active {
            display: block;
        }
        
        .dropdown-item {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 0.75rem 1.25rem;
            color: var(--text-light);
            text-decoration: none;
            transition: background 0.3s;
        }
        
        .dropdown-item:hover {
            background: rgba(14, 165, 233, 0.1);
        }
        
        .dropdown-divider {
            height: 1px;
            background: rgba(255,255,255,0.1);
            margin: 0.5rem 0;
        }
        
        /* Toast */
        .toast {
            position: fixed;
            bottom: 2rem;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: var(--bg-card);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            padding: 1rem 2rem;
            color: var(--text-light);
            box-shadow: 0 10px 40px rgba(0,0,0,0.4);
            transition: transform 0.3s;
            z-index: 3000;
        }
        
        .toast.show {
            transform: translateX(-50%) translateY(0);
        }
        
        .toast.success {
            border-color: #10B981;
            background: rgba(16, 185, 129, 0.1);
        }
        
        .toast.error {
            border-color: #EF4444;
            background: rgba(239, 68, 68, 0.1);
        }
        
        @media (max-width: 768px) {
            .mobile-toggle { display: flex; }
            .nav-container { display: none; }
            .main-container { grid-template-columns: 1fr; }
            .sidebar { display: none; }
            .content-header { flex-direction: column; gap: 1rem; align-items: flex-start; }
            .batch-actions { width: 100%; justify-content: space-between; }
            .notification-item { flex-direction: column; }
            .notification-icon-type { margin-bottom: 1rem; }
            .page-hero h1 { font-size: 2rem; }
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="nav-logo-wrapper">
            <a href="index.html" class="logo">🚀 AI 租易用</a>
        </div>
        <div class="nav-container">
            <ul class="nav-links">
                <li><a href="rental.html">设备租赁</a></li>
                <li><a href="token.html">Token 工厂</a></li>

            </ul>
        </div>
        <div class="nav-right-wrapper">
            <!-- Notification Icon -->
            <div class="notification-icon" onclick="location.href='notification.html'" title="消息通知">
                <svg viewBox="0 0 24 24">
                    <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/>
                    <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
                </svg>
                <span class="notification-badge" id="navbarUnreadBadge">0</span>

            <!-- Login button (shown when not logged in) -->
            <button class="btn btn-primary" id="loginBtn" onclick="openLoginModal()">登录 / 注册</button>
            <!-- User menu (shown when logged in) -->
            <div class="user-menu" id="userMenu" style="display: none;">
                <div class="user-btn" onclick="toggleUserDropdown()">
                    <div class="user-avatar-small" id="userAvatar">U</div>
                    <span id="userName">用户</span>
                    <span style="font-size: 0.75rem;">▼</span>
                </div>
                <div class="user-dropdown" id="userDropdown">
                    <a href="user.html" class="dropdown-item">
                        <span>👤</span> 用户中心
                    </a>
                    <a href="notification.html" class="dropdown-item">
                        <span>🔔</span> 消息通知
                    </a>
                    <div class="dropdown-divider"></div>
                    <a href="#" class="dropdown-item" onclick="logout()">
                        <span>🚪</span> 退出登录
                    </a>
                </div>
            </div>
        </div>
        <div class="mobile-toggle" onclick="toggleMobileMenu()">
            <span></span><span></span><span></span>
        </div>
    </nav>
    
    <div class="mobile-menu" id="mobileMenu">
        <a href="rental.html">设备租赁</a>
        <a href="token.html">Token 工厂</a>
        <a href="services.html">AI 技术服务</a>
        <a href="community.html">OPC 社区</a>
        <a href="notification.html" style="color: var(--primary);">🔔 消息通知</a>
        <button class="btn btn-primary" id="mobileLoginBtn" onclick="openLoginModal()" style="margin-top:0.75rem;">登录 / 注册</button>
        <div class="user-menu" id="mobileUserMenu" style="display: none; margin-top: 0.75rem;">
            <div class="user-btn" onclick="toggleMobileUserDropdown()" style="width: 100%; justify-content: space-between;">
                <div style="display: flex; align-items: center; gap: 0.5rem;">
                    <div class="user-avatar-small" id="mobileUserAvatar">U</div>
                    <span id="mobileUserName">用户</span>
                </div>
                <span>▼</span>
            </div>
            <div class="user-dropdown" id="mobileUserDropdown" style="position: static; box-shadow: none; margin-top: 0.5rem;">
                <a href="user.html" class="dropdown-item">
                    <span>👤</span> 用户中心
                </a>
                <a href="notification.html" class="dropdown-item">
                    <span>🔔</span> 消息通知
                </a>
                <div class="dropdown-divider"></div>
                <a href="#" class="dropdown-item" onclick="logout(); toggleMobileUserDropdown();">
                    <span>🚪</span> 退出登录
                </a>
            </div>
        </div>
    </div>

    <!-- Page Hero -->
    <section class="page-hero">
        <div class="breadcrumb">
            <a href="index.html">首页</a>
            <span>/</span>
            <span>消息通知</span>
        </div>
        <h1>🔔 消息通知</h1>
        <p>查看您的所有系统通知、订单状态和提醒消息</p>
    </section>

    <!-- Main Container -->
    <div class="main-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="user-profile">
                <div class="user-avatar" id="sidebarAvatar">U</div>
                <div class="user-name" id="sidebarName">用户</div>
                <div class="user-level">普通会员</div>
            </div>
            <ul class="sidebar-nav">
                <li><a href="user.html"><span class="icon">👤</span> 个人中心</a></li>
                <li><a href="#" class="active"><span class="icon">🔔</span> 消息通知</a></li>
                <li><a href="#"><span class="icon">📦</span> 我的订单</a></li>
                <li><a href="#"><span class="icon">💳</span> 账户充值</a></li>
                <li><a href="#"><span class="icon">📊</span> 使用统计</a></li>
                <li><a href="#"><span class="icon">⚙️</span> 账户设置</a></li>
            </ul>
        </aside>

        <!-- Main Content -->
        <main class="content-area">
            <div class="content-header">
                <h2 class="content-title">消息列表</h2>
                <div class="batch-actions">
                    <div class="checkbox-wrapper">
                        <input type="checkbox" id="selectAll" onchange="toggleSelectAll()">
                        <label for="selectAll" style="cursor: pointer; color: var(--text-muted);">全选</label>
                    </div>
                    <button class="btn btn-sm btn-outline" onclick="markSelectedAsRead()">标记已读</button>
                    <button class="btn btn-sm btn-danger" onclick="deleteSelected()">删除</button>
                </div>
            </div>

            <!-- Filter Tabs -->
            <div class="filter-tabs">
                <button class="filter-tab active" onclick="filterNotifications('all')">全部</button>
                <button class="filter-tab" onclick="filterNotifications('system')">系统通知</button>
                <button class="filter-tab" onclick="filterNotifications('order')">订单通知</button>
                <button class="filter-tab" onclick="filterNotifications('rental')">租赁通知</button>
                <button class="filter-tab" onclick="filterNotifications('token')">Token 通知</button>
                <button class="filter-tab" onclick="filterNotifications('unread')">未读</button>
            </div>

            <!-- Notification List -->
            <div class="notification-list" id="notificationList">
                <!-- Notifications will be rendered here by JavaScript -->
            </div>
        </main>
    </div>

    <!-- Toast Notification -->
    <div class="toast" id="toast"></div>

    <script>
        // ==================== User State Management ====================
        let currentUser = null;

        window.addEventListener('DOMContentLoaded', () => {
            const savedUser = localStorage.getItem('aiZuyiyongUser');
            if (savedUser) {
                currentUser = JSON.parse(savedUser);
                updateUIForLoggedInUser();
            }
            loadNotifications();
            updateUnreadBadge();
        });

        // ==================== Notification Data ====================
        let notifications = [];
        let currentFilter = 'all';

        function loadNotifications() {
            const saved = localStorage.getItem('aiZuyiyongNotifications');
            if (saved) {
                notifications = JSON.parse(saved);
            } else {
                // Sample notifications
                notifications = [
                    {
                        id: 1,
                        type: 'system',
                        title: '平台维护公告',
                        summary: '为了提供更好的服务，我们将于本周六凌晨 2:00-4:00 进行系统维护，期间部分功能可能暂时不可用。',
                        time: '2024-01-15 10:30',
                        read: false
                    },
                    {
                        id: 2,
                        type: 'order',
                        title: '订单支付成功',
                        summary: '您的订单 #ORD-20240115-001 已支付成功，金额 ¥299.00，服务已自动开通。',
                        time: '2024-01-15 09:15',
                        read: false
                    },
                    {
                        id: 3,
                        type: 'rental',
                        title: '设备到期提醒',
                        summary: '您租赁的 GPU 服务器将在 3 天后到期，请及时续租或备份数据。',
                        time: '2024-01-14 16:20',
                        read: true
                    },
                    {
                        id: 4,
                        type: 'token',
                        title: 'Token 余额不足',
                        summary: '您的 Token 余额已低于 100，为避免影响使用，请及时充值。',
                        time: '2024-01-14 14:00',
                        read: false
                    },
                    {
                        id: 5,
                        type: 'system',
                        title: '新功能上线',
                        summary: '我们新增了批量 API 调用功能，支持最高 100 并发，欢迎体验！',
                        time: '2024-01-13 11:00',
                        read: true
                    },
                    {
                        id: 6,
                        type: 'token',
                        title: '充值成功',
                        summary: '您已成功充值 10000 Token，当前余额 10580 Token。',
                        time: '2024-01-13 10:30',
                        read: true
                    },
                    {
                        id: 7,
                        type: 'order',
                        title: '订单状态变更',
                        summary: '您的订单 #ORD-20240112-003 已发货，预计 2-3 个工作日内送达。',
                        time: '2024-01-12 15:45',
                        read: true
                    },
                    {
                        id: 8,
                        type: 'rental',
                        title: '续租成功',
                        summary: '您的 GPU 服务器已成功续租 30 天，新到期日为 2024-02-15。',
                        time: '2024-01-12 10:00',
                        read: true
                    },
                    {
                        id: 9,
                        type: 'system',
                        title: '安全提醒',
                        summary: '检测到您的账户在新设备登录，如非本人操作请及时修改密码。',
                        time: '2024-01-11 18:30',
                        read: false
                    },
                    {
                        id: 10,
                        type: 'token',
                        title: 'Token 即将过期',
                        summary: '您有 500 Token 将在 7 天后过期，请尽快使用。',
                        time: '2024-01-11 09:00',
                        read: true
                    }
                ];
                saveNotifications();
            }
            renderNotifications();
        }

        function saveNotifications() {
            localStorage.setItem('aiZuyiyongNotifications', JSON.stringify(notifications));
        }

        // ==================== Render Notifications ====================
        function getTypeIcon(type) {
            const icons = {
                system: '📢',
                order: '📦',
                rental: '⏰',
                token: '💰'
            };
            return icons[type] || '📬';
        }

        function getTypeName(type) {
            const names = {
                system: '系统',
                order: '订单',
                rental: '租赁',
                token: 'Token'
            };
            return names[type] || '其他';
        }

        function renderNotifications() {
            const list = document.getElementById('notificationList');
            let filtered = notifications;

            if (currentFilter === 'unread') {
                filtered = notifications.filter(n => !n.read);
            } else if (currentFilter !== 'all') {
                filtered = notifications.filter(n => n.type === currentFilter);
            }

            if (filtered.length === 0) {
                list.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">📭</div>
                        <h3>暂无消息</h3>
                        <p>当有新的通知时，会显示在这里</p>
                    </div>
                `;
                return;
            }

            list.innerHTML = filtered.map(n => `
                <div class="notification-item ${n.read ? '' : 'unread'}" data-id="${n.id}">
                    <div class="notification-icon-type ${n.type}">
                        ${getTypeIcon(n.type)}
                    </div>
                    <div class="notification-content">
                        <div class="notification-header">
                            <div class="notification-title">${n.title}</div>
                            <div class="notification-time">${n.time}</div>
                        </div>
                        <div class="notification-summary">${n.summary}</div>
                        <div class="notification-footer">
                            <span class="notification-type-badge ${n.type}">${getTypeName(n.type)}通知</span>
                            <div class="notification-actions">
                                ${n.read ? `
                                    <button class="btn-mark-read" onclick="markAsRead(${n.id})">标记未读</button>
                                ` : `
                                    <button class="btn-mark-read" onclick="markAsRead(${n.id})">标记已读</button>
                                `}
                                <button class="btn-delete" onclick="deleteNotification(${n.id})">删除</button>
                            </div>
                        </div>
                    </div>
                    ${!n.read ? '<div class="unread-indicator"></div>' : ''}
                </div>
            `).join('');
        }

        // ==================== Filter ====================
        function filterNotifications(filter) {
            currentFilter = filter;
            document.querySelectorAll('.filter-tab').forEach(tab => {
                tab.classList.remove('active');
            });
            event.target.classList.add('active');
            renderNotifications();
        }

        // ==================== Individual Actions ====================
        function markAsRead(id) {
            const notification = notifications.find(n => n.id === id);
            if (notification) {
                notification.read = !notification.read;
                saveNotifications();
                renderNotifications();
                updateUnreadBadge();
                showToast(notification.read ? '已标记为已读' : '已标记为未读', 'success');
            }
        }

        function deleteNotification(id) {
            notifications = notifications.filter(n => n.id !== id);
            saveNotifications();
            renderNotifications();
            updateUnreadBadge();
            showToast('已删除通知', 'success');
        }

        // ==================== Batch Actions ====================
        function toggleSelectAll() {
            const selectAll = document.getElementById('selectAll');
            const filtered = currentFilter === 'unread' 
                ? notifications.filter(n => !n.read) 
                : currentFilter === 'all'
                ? notifications
                : notifications.filter(n => n.type === currentFilter);
            
            if (selectAll.checked) {
                filtered.forEach(n => n.selected = true);
            } else {
                filtered.forEach(n => n.selected = false);
            }
        }

        function markSelectedAsRead() {
            const selected = notifications.filter(n => n.selected);
            if (selected.length === 0) {
                showToast('请先选择要标记的通知', 'error');
                return;
            }
            selected.forEach(n => n.read = true);
            saveNotifications();
            renderNotifications();
            updateUnreadBadge();
            showToast(`已标记 ${selected.length} 条通知为已读`, 'success');
        }

        function deleteSelected() {
            const selected = notifications.filter(n => n.selected);
            if (selected.length === 0) {
                showToast('请先选择要删除的通知', 'error');
                return;
            }
            if (!confirm(`确定要删除选中的 ${selected.length} 条通知吗？`)) {
                return;
            }
            notifications = notifications.filter(n => !n.selected);
            saveNotifications();
            renderNotifications();
            updateUnreadBadge();
            document.getElementById('selectAll').checked = false;
            showToast(`已删除 ${selected.length} 条通知`, 'success');
        }

        // ==================== Unread Badge ====================
        function updateUnreadBadge() {
            const unreadCount = notifications.filter(n => !n.read).length;
            const badge = document.getElementById('navbarUnreadBadge');
            if (unreadCount > 0) {
                badge.textContent = unreadCount > 99 ? '99+' : unreadCount;
                badge.classList.remove('hidden');
            } else {
                badge.classList.add('hidden');
            }
        }

        // ==================== User UI Functions ====================
        function updateUIForLoggedInUser() {
            if (!currentUser) return;

            const loginBtn = document.getElementById('loginBtn');
            const userMenu = document.getElementById('userMenu');
            if (loginBtn) loginBtn.style.display = 'none';
            if (userMenu) {
                userMenu.style.display = 'block';
                userMenu.classList.add('active');
            }
            document.getElementById('userAvatar').textContent = currentUser.avatar || 'U';
            document.getElementById('userName').textContent = currentUser.name;

            document.getElementById('mobileLoginBtn').style.display = 'none';
            document.getElementById('mobileUserMenu').style.display = 'block';
            document.getElementById('mobileUserAvatar').textContent = currentUser.avatar || 'U';
            document.getElementById('mobileUserName').textContent = currentUser.name;

            document.getElementById('sidebarAvatar').textContent = currentUser.avatar || 'U';
            document.getElementById('sidebarName').textContent = currentUser.name;
        }

        function toggleUserDropdown() {
            document.getElementById('userDropdown').classList.toggle('active');
        }

        function toggleMobileUserDropdown() {
            document.getElementById('mobileUserDropdown').classList.toggle('active');
        }

        document.addEventListener('click', (e) => {
            if (!e.target.closest('.user-btn') && !e.target.closest('.user-dropdown')) {
                document.getElementById('userDropdown').classList.remove('active');
                document.getElementById('mobileUserDropdown').classList.remove('active');
            }
        });

        function toggleMobileMenu() {
            document.getElementById('mobileMenu').classList.toggle('active');
        }

        function logout() {
            currentUser = null;
            localStorage.removeItem('aiZuyiyongUser');
            
            const loginBtn = document.getElementById('loginBtn');
            const userMenu = document.getElementById('userMenu');
            if (loginBtn) loginBtn.style.display = 'inline-flex';
            if (userMenu) {
                userMenu.style.display = 'none';
                userMenu.classList.remove('active');
            }
            
            document.getElementById('mobileLoginBtn').style.display = 'block';
            document.getElementById('mobileUserMenu').style.display = 'none';
            
            document.getElementById('userDropdown').classList.remove('active');
            document.getElementById('mobileUserDropdown').classList.remove('active');
            
            showToast('已退出登录', 'success');
        }

        // ==================== Login Modal (placeholder) ====================
        function openLoginModal() {
            window.location.href = 'index.html';
        }

        // ==================== Toast ====================
        function showToast(message, type = 'success') {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.className = `toast ${type} show`;
            
            setTimeout(() => {
                toast.classList.remove('show');
            }, 3000);
        }
    </script>
</body>
</html>
