version: '3.8'

services:
  # PostgreSQL 数据库
  postgres:
    image: docker.m.daocloud.io/library/postgres:15-alpine
    container_name: ai-zuyiyong-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ai_zuyiyong
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./prisma/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - ai-zuyiyong-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis 缓存
  redis:
    image: docker.m.daocloud.io/library/redis:7-alpine
    container_name: ai-zuyiyong-redis
    restart: unless-stopped
    command: redis-server --requirepass redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - ai-zuyiyong-network
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # 后端应用 (开发模式)
  app:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: ai-zuyiyong-app
    restart: unless-stopped
    environment:
      - NODE_ENV=development
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/ai_zuyiyong?schema=public
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=redis
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - ../:/frontend
      - /app/node_modules
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - ai-zuyiyong-network
    command: npm run dev

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  ai-zuyiyong-network:
    driver: bridge
