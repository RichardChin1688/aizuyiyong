# Nginx 反向代理配置
# AI 租易用后端服务

upstream backend {
    server localhost:3000;
    keepalive 64;
}

server {
    listen 80;
    server_name api.ai-zuyiyong.com;
    
    # 强制 HTTPS
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    server_name api.ai-zuyiyong.com;
    
    # SSL 证书配置
    ssl_certificate /etc/nginx/ssl/api.ai-zuyiyong.com.crt;
    ssl_certificate_key /etc/nginx/ssl/api.ai-zuyiyong.com.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    
    # 安全头
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    
    # 日志
    access_log /var/log/nginx/api-access.log;
    error_log /var/log/nginx/api-error.log;
    
    # 请求大小限制
    client_max_body_size 10M;
    
    # API 代理
    location /api/ {
        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 90s;
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
    }
    
    # 健康检查端点 (不记录日志)
    location /health {
        access_log off;
        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
    
    # 静态文件 (上传目录)
    location /uploads/ {
        alias /opt/ai-zuyiyong/backend/uploads/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
    
    # 限流
    location /api/auth/sms/send {
        limit_req zone=sms_limit burst=5 nodelay;
        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}

# 限流配置
http {
    # 短信接口限流：每秒 1 个请求
    limit_req_zone $binary_remote_addr zone=sms_limit:10m rate=1r/s;
    
    # 通用 API 限流：每秒 10 个请求
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;
}
