<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>联系我们 - AI 租易用 | 获取专属方案</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    :root {
      --primary: #0EA5E9;
      --primary-dark: #0C4A6E;
      --accent: #F59E0B;
      --bg-dark: #0B1120;
      --bg-card: #1E293B;
      --text-light: #F1F5F9;
      --text-muted: #94A3B8;
      --gradient: linear-gradient(135deg, #0EA5E9 0%, #7C3AED 100%);
      --success: #10B981;
    }
    
    body {
      font-family: 'Inter', 'PingFang SC', 'Microsoft YaHei', sans-serif;
      background: var(--bg-dark);
      color: var(--text-light);
      line-height: 1.7;
    }
    
    body::before {
      content: '';
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: radial-gradient(ellipse at 50% 10%, rgba(124, 58, 237, 0.06) 0%, transparent 50%);
      pointer-events: none;
      z-index: -1;
    }
    
    .navbar {
      position: fixed;
      top: 0;
      width: 100%;
      padding: 0.75rem 5%;
      background: rgba(11, 17, 32, 0.95);
      backdrop-filter: blur(20px);
      display: flex;
      justify-content: space-between;
      align-items: center;
      z-index: 1000;
      border-bottom: 1px solid rgba(255,255,255,0.08);
      height: 70px;
    }
    
    .nav-logo-wrapper { position: absolute; left: 5%; }
    .nav-container { display: flex; align-items: center; gap: 3rem; flex: 1; justify-content: center; }
    .nav-right-wrapper { position: absolute; right: 5%; }
    
    .logo {
      font-size: 1.6rem;
      font-weight: 800;
      background: var(--gradient);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      text-decoration: none;
    }
    
    .nav-links { display: flex; gap: 0.5rem; list-style: none; margin: 0; padding: 0; }
    .nav-links a {
      color: var(--text-muted);
      text-decoration: none;
      padding: 0.6rem 1rem;
      border-radius: 8px;
      font-weight: 500;
      transition: all 0.3s;
    }
    .nav-links a:hover, .nav-links a.active {
      color: var(--text-light);
      background: rgba(14, 165, 233, 0.12);
    }
    
    .btn {
      padding: 0.75rem 1.5rem;
      border-radius: 10px;
      font-weight: 600;
      text-decoration: none;
      transition: all 0.3s;
      border: none;
      cursor: pointer;
    }
    .btn-primary {
      background: var(--gradient);
      color: white;
      box-shadow: 0 4px 20px rgba(14, 165, 233, 0.3);
    }
    .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 30px rgba(14, 165, 233, 0.4); }
    
    .page-hero {
      padding: 6rem 5% 3rem;
      text-align: center;
      background: radial-gradient(ellipse at 50% 0%, rgba(14, 165, 233, 0.15) 0%, transparent 50%);
    }
    .page-hero h1 {
      font-size: 2.5rem;
      font-weight: 800;
      margin-bottom: 1rem;
      background: var(--gradient);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .page-hero p {
      color: var(--text-muted);
      font-size: 1.1rem;
      max-width: 700px;
      margin: 0 auto;
    }
    
    .contact-container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 3rem 5%;
    }
    
    .contact-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 2rem;
      margin-bottom: 4rem;
    }
    
    .contact-card {
      background: var(--bg-card);
      border-radius: 16px;
      border: 1px solid rgba(255,255,255,0.08);
      padding: 2rem;
      text-align: center;
      transition: all 0.3s;
    }
    .contact-card:hover {
      transform: translateY(-4px);
      border-color: rgba(14, 165, 233, 0.3);
    }
    .contact-icon {
      font-size: 2.5rem;
      margin-bottom: 1rem;
    }
    .contact-title {
      font-size: 1.2rem;
      font-weight: 700;
      margin-bottom: 0.5rem;
    }
    .contact-info {
      color: var(--text-muted);
      font-size: 0.95rem;
    }
    
    .form-section {
      background: var(--bg-card);
      border-radius: 16px;
      border: 1px solid rgba(255,255,255,0.08);
      padding: 3rem;
      max-width: 800px;
      margin: 0 auto;
    }
    .form-section h2 {
      text-align: center;
      font-size: 1.8rem;
      font-weight: 700;
      margin-bottom: 1rem;
    }
    .form-section > p {
      text-align: center;
      color: var(--text-muted);
      margin-bottom: 2rem;
    }
    
    .form-group {
      margin-bottom: 1.5rem;
    }
    .form-group label {
      display: block;
      margin-bottom: 0.5rem;
      font-weight: 600;
      color: var(--text-light);
    }
    .form-group input,
    .form-group select,
    .form-group textarea {
      width: 100%;
      padding: 0.875rem 1rem;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 10px;
      color: var(--text-light);
      font-size: 1rem;
      transition: all 0.3s;
    }
    .form-group input:focus,
    .form-group select:focus,
    .form-group textarea:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(14, 165, 233, 0.1);
    }
    .form-group textarea {
      min-height: 120px;
      resize: vertical;
    }
    
    .form-row {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 1rem;
    }
    
    .submit-btn {
      width: 100%;
      padding: 1rem;
      font-size: 1.1rem;
      margin-top: 1rem;
    }
    
    .success-message {
      display: none;
      text-align: center;
      padding: 3rem;
      background: rgba(16, 185, 129, 0.1);
      border: 1px solid var(--success);
      border-radius: 16px;
      margin-top: 2rem;
    }
    .success-message.show {
      display: block;
    }
    .success-icon {
      font-size: 4rem;
      margin-bottom: 1rem;
    }
    .success-title {
      font-size: 1.5rem;
      font-weight: 700;
      margin-bottom: 0.5rem;
      color: var(--success);
    }
    .success-desc {
      color: var(--text-muted);
    }
    
    @media (max-width: 768px) {
      .nav-links { display: none; }
      .form-section { padding: 2rem 1.5rem; }
    }
  </style>
</head>
<body>
  <nav class="navbar">
    <div class="nav-logo-wrapper">
      <a href="index.html" class="logo">🚀 AI 租易用</a>
    </div>
    <div class="nav-container">
      <ul class="nav-links">
        <li><a href="index.html">首页</a></li>
        <li><a href="rental.html">设备租赁</a></li>
        <li><a href="token.html">Token 工厂</a></li>
        <li><a href="services.html">技术服务</a></li>
        <li><a href="community.html">OPC 社区</a></li>
      </ul>
    </div>
    <div class="nav-right-wrapper">
      <a href="user.html" class="btn btn-primary">用户中心</a>
    </div>
  </nav>

  <section class="page-hero">
    <h1>📬 联系我们</h1>
    <p>专业团队一对一咨询，定制最适合您的 AI 解决方案</p>
  </section>

  <div class="contact-container">
    <div class="contact-grid">
      <div class="contact-card">
        <div class="contact-icon">📧</div>
        <div class="contact-title">邮箱咨询</div>
        <div class="contact-info">contact@aizuyiyong.com</div>
      </div>
      <div class="contact-card">
        <div class="contact-icon">💬</div>
        <div class="contact-title">微信客服</div>
        <div class="contact-info">AI_ZUYIYONG</div>
      </div>
      <div class="contact-card">
        <div class="contact-icon">📍</div>
        <div class="contact-title">公司地址</div>
        <div class="contact-info">北京市朝阳区科技园区</div>
      </div>
    </div>

    <div class="form-section">
      <h2>🚀 获取专属方案</h2>
      <p>填写以下信息，我们的专业顾问将在 24 小时内与您联系</p>
      
      <form id="contactForm">
        <div class="form-row">
          <div class="form-group">
            <label for="name">* 姓名</label>
            <input type="text" id="name" name="name" required placeholder="请输入您的姓名">
          </div>
          <div class="form-group">
            <label for="company">公司名称</label>
            <input type="text" id="company" name="company" placeholder="请输入公司名称">
          </div>
        </div>
        
        <div class="form-row">
          <div class="form-group">
            <label for="phone">* 手机号</label>
            <input type="tel" id="phone" name="phone" required placeholder="请输入手机号码">
          </div>
          <div class="form-group">
            <label for="email">邮箱</label>
            <input type="email" id="email" name="email" placeholder="请输入邮箱地址">
          </div>
        </div>
        
        <div class="form-group">
          <label for="company-size">* 公司规模</label>
          <select id="company-size" name="companySize" required>
            <option value="">请选择公司规模</option>
            <option value="small">＜30 人（小微企业）</option>
            <option value="medium">30-200 人（中型企业）</option>
            <option value="large">200 人以上（大型企业）</option>
          </select>
        </div>
        
        <div class="form-group">
          <label for="interest">* 感兴趣的服务</label>
          <select id="interest" name="interest" required>
            <option value="">请选择服务类型</option>
            <option value="rental">AI 设备租赁</option>
            <option value="token">Token 工厂</option>
            <option value="custom">智能体定制开发</option>
            <option value="knowledge">私有知识库</option>
            <option value="digital-employee">数字员工</option>
            <option value="consulting">战略咨询</option>
            <option value="other">其他服务</option>
          </select>
        </div>
        
        <div class="form-group">
          <label for="message">需求描述</label>
          <textarea id="message" name="message" placeholder="请简单描述您的需求，我们将为您定制专属方案"></textarea>
        </div>
        
        <button type="submit" class="btn btn-primary submit-btn">提交咨询</button>
      </form>
      
      <div class="success-message" id="successMessage">
        <div class="success-icon">✅</div>
        <div class="success-title">提交成功！</div>
        <div class="success-desc">感谢您的咨询，我们的专业顾问将在 24 小时内与您联系</div>
      </div>
    </div>
  </div>

  <script>
    // 表单提交处理
    document.getElementById('contactForm').addEventListener('submit', function(e) {
      e.preventDefault();
      
      // 获取表单数据
      const formData = {
        name: document.getElementById('name').value,
        company: document.getElementById('company').value,
        phone: document.getElementById('phone').value,
        email: document.getElementById('email').value,
        companySize: document.getElementById('company-size').value,
        interest: document.getElementById('interest').value,
        message: document.getElementById('message').value,
        timestamp: new Date().toISOString()
      };
      
      // 保存到 localStorage（实际应该发送到后端）
      const contacts = JSON.parse(localStorage.getItem('aiZuyiyongContacts') || '[]');
      contacts.push(formData);
      localStorage.setItem('aiZuyiyongContacts', JSON.stringify(contacts));
      
      // 显示成功消息
      document.getElementById('contactForm').style.display = 'none';
      document.getElementById('successMessage').classList.add('show');
      
      console.log('📩 咨询表单提交:', formData);
    });
  </script>
</body>
</html>
