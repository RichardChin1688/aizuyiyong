<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>页面未找到 - AI 租易用</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root {
            --primary: #0EA5E9;
            --primary-dark: #0C4A6E;
            --accent: #F59E0B;
            --bg-dark: #0B1120;
            --bg-card: #1E293B;
            --text-light: #F1F5F9;
            --text-muted: #94A3B8;
            --gradient: linear-gradient(135deg, #0EA5E9 0%, #7C3AED 100%);
        }
        
        body {
            font-family: 'Inter', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: var(--bg-dark);
            color: var(--text-light);
            line-height: 1.7;
        }
        
        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: radial-gradient(ellipse at 50% 10%, rgba(124, 58, 237, 0.06) 0%, transparent 50%);
            pointer-events: none;
            z-index: -1;
        }
        
        .error-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 8rem 5% 4rem;
        }
        
        .error-content {
            text-align: center;
            max-width: 600px;
        }
        
        .error-code {
            font-size: 10rem;
            font-weight: 900;
            background: var(--gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            line-height: 1;
            margin-bottom: 1rem;
        }
        
        .error-title {
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 1rem;
            color: var(--text-light);
        }
        
        .error-message {
            color: var(--text-muted);
            font-size: 1.1rem;
            margin-bottom: 3rem;
            line-height: 1.8;
        }
        
        .error-actions {
            display: flex;
            gap: 1rem;
            justify-content: center;
            flex-wrap: wrap;
        }
        
        .btn {
            padding: 1rem 2rem;
            border-radius: 12px;
            font-weight: 600;
            text-decoration: none;
            transition: all 0.3s;
            border: none;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
        }
        
        .btn-primary {
            background: var(--gradient);
            color: white;
            box-shadow: 0 4px 20px rgba(14, 165, 233, 0.3);
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(14, 165, 233, 0.4);
        }
        
        .btn-outline {
            background: transparent;
            border: 2px solid rgba(255,255,255,0.2);
            color: var(--text-light);
        }
        
        .btn-outline:hover {
            border-color: var(--primary);
            background: rgba(14, 165, 233, 0.1);
        }
        
        .error-illustration {
            font-size: 5rem;
            margin-bottom: 2rem;
            opacity: 0.8;
        }
        
        @media (max-width: 768px) {
            .error-code { font-size: 6rem; }
            .error-title { font-size: 1.5rem; }
        }
    </style>
</head>
<body>
    <div class="error-container">
        <div class="error-content">
            <div class="error-illustration">🔭</div>
            <div class="error-code">404</div>
            <h1 class="error-title">哎呀，页面走丢了</h1>
            <p class="error-message">
                您访问的页面不存在或已被移除。<br>
                可能是链接有误，也可能是页面刚刚搬了家。
            </p>
            <div class="error-actions">
                <a href="index.html" class="btn btn-primary">🏠 返回首页</a>
                <a href="rental.html" class="btn btn-outline">浏览产品</a>
            </div>
        </div>
    </div>
</body>
</html>
